<header>
    <div class="mini-navbar-wrap">
        <div class="logo-wrap">
            <p class="logo"><span class="logo">SoftUni Forum</span></p>
        </div>
        <div class="mini-navbar">
            <ul>
                @if (userService.isLoggedIn()) {
                <li>
                    <a routerLink="/profile">{{userService.currentUser()?.username}}'s profile</a>
                </li>
                <li>
                    <a href="#" (click)="logout(); $event.preventDefault()">Logout</a>
                </li>
                } @else {
                <li>
                    <a routerLink="/login">Login</a>
                </li>
                <li>
                    <a routerLink="/register">Register</a>
                </li>
                }
            </ul>
        </div>
    </div>
    <nav>
        <ul>
            <li>
                <a routerLink="/home" routerLinkActive="active">Home</a>
            </li>
            <li>
                <a routerLink="/themes" routerLinkActive="active">Themes</a>
            </li>
            @if (userService.isLoggedIn()) {
            <li>
                <a href="#">New Theme</a>
            </li>
            }
        </ul>
    </nav>

</header>
