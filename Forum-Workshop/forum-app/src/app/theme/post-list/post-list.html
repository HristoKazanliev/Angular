<!-- aside component  -->
<aside>
    <div class="aside">
        <h2 class="title">
            Recent posts
        </h2>
        <div>
            @if(posts.length > 0) {
            @for (post of posts; track post._id) {
            <div class="aside-theme">
                <a [routerLink]="['/themes', post.themeId._id]">
                    <h3>{{post.themeId.themeName}}</h3>
                    <p>{{post.userId.username}}</p>
                    <p><span>{{post.created_at}}</span></p>
                </a>
            </div>
            }
            } @else {
            <p>No recent posts!</p>
            }
        </div>
    </div>
</aside>
